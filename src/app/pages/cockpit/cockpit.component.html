<div class="page">
  <header class="header">
    <h1>Chatbot Cockpit</h1>
    <span class="pill">Live</span>
    <button class="btn" routerLink="/chat">Vai alla Chat</button>
  </header>

  <!-- KPI -->
  <section class="kpis">
    <div class="card kpi">
      <div class="kpi-label">Conversazioni</div>
      <div class="kpi-value">{{ num(totalConversations()) }}</div>
    </div>

    <div class="card kpi">
      <div class="kpi-label">Risolte da AI</div>
      <div class="kpi-value green">{{ num(aiResolved()) }}</div>
      <div class="kpi-foot">Handoff: {{ num(handoff()) }}</div>
    </div>

    <div class="card kpi">
      <div class="kpi-label">Tempo risposta AI</div>
      <div class="kpi-value">{{ avgResponseMs() }} ms</div>
      <div class="kpi-foot">Durata conv: {{ avgConversationSec() }} s</div>
    </div>

    <div class="card kpi">
      <div class="kpi-label">Utenti unici</div>
      <div class="kpi-value">{{ num(uniqueUsers()) }}</div>
      <div class="kpi-foot">Tot. interazioni</div>
    </div>
  </section>

  <!-- Top intent -->
  <section class="grid">
    <div class="card chart">
      <div class="card-title">Top intent</div>
      <div class="chart-box">
        <canvas
          baseChart
          [type]="'bar'"
          [data]="topIntentData()"
          [options]="barOptions">
        </canvas>
      </div>
    </div>
  </section>
</div>
